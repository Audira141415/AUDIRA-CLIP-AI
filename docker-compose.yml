version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: audira-postgres
    environment:
      POSTGRES_USER: audira
      POSTGRES_PASSWORD: audirapassword
      POSTGRES_DB: audira_db
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
