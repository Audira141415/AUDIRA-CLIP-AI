apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audira-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.audira.ai
    secretName: audira-tls
  rules:
  - host: api.audira.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
